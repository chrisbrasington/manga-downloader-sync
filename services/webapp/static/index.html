<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Manga Library</title>
  <style>
    :root {
      --bg: #0e0f13;
      --panel: #15171d;
      --border: #252730;
      --ink: #d4d6e0;
      --muted: #6b7080;
      --accent: #e2b96f;
      --green: #4caf77;
      --yellow: #e2b96f;
      --red: #e05c5c;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

    header { background:var(--panel); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:16px; }
    header h1 { font-size:18px; font-weight:600; color:var(--accent); flex:1; }
    header a { color:var(--muted); text-decoration:none; font-size:14px; }
    header a:hover { color:var(--ink); }
    #saving { font-size:12px; color:var(--muted); display:none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    #saving.active { display:inline; animation:blink 1s ease-in-out infinite; }

    .filters { padding:14px 20px 0; display:flex; gap:8px; }
    .filter-btn { background:var(--panel); border:1px solid var(--border); color:var(--muted); padding:5px 14px; border-radius:20px; cursor:pointer; font-size:13px; transition:all .15s; }
    .filter-btn:hover, .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#111; }

    .stats { padding:8px 20px; font-size:13px; color:var(--muted); }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:16px; padding:16px 20px 32px; }

    .card { background:var(--panel); border:1px solid var(--border); border-radius:8px; overflow:hidden; cursor:pointer; transition:transform .15s,border-color .15s; }
    .card:hover { transform:translateY(-2px); border-color:var(--accent); }
    .thumb { width:100%; aspect-ratio:2/3; background:#1e202a center/cover no-repeat; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--muted); }
    .card-body { padding:10px; }
    .card-title { font-size:13px; font-weight:500; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:6px; }
    .card-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .badge { font-size:11px; padding:2px 7px; border-radius:10px; font-weight:500; }
    .badge-active { background:#1a3a2a; color:var(--green); }
    .badge-completed { background:#2a2a2a; color:var(--muted); }
    .badge-hiatus { background:#3a2a1a; color:var(--yellow); }
    .badge-archived { background:#1a1a1a; color:#444; }
    .ch-num { font-size:11px; color:var(--muted); margin-left:auto; }
    .star-btn { background:rgba(0,0,0,.55); border:none; border-radius:6px; cursor:pointer; font-size:14px; line-height:1; padding:4px 5px; opacity:.6; position:absolute; top:6px; right:6px; transition:opacity .15s,transform .15s,background .15s; }
    .star-btn:hover { opacity:1; background:rgba(0,0,0,.75); }
    .star-btn.on { opacity:1; background:rgba(0,0,0,.75); transform:scale(1.1); }
    .thumb-wrap { position:relative; }

    /* chapter panel */
    .panel-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; }
    .panel-overlay.open { display:flex; align-items:flex-end; justify-content:center; }
    .panel { background:var(--panel); border-radius:12px 12px 0 0; width:100%; max-width:600px; height:100dvh; max-height:100dvh; display:flex; flex-direction:column; }

    /* hero: cover image + overlaid panel-head */
    .panel-hero { position:relative; width:100%; flex-shrink:0; background:#0e0f13; border-radius:12px 12px 0 0; overflow:hidden; }
    .panel-hero-img { width:100%; aspect-ratio:2/3; max-height:65vh; object-fit:cover; object-position:center top; display:block; }
    .panel-head { display:flex; align-items:center; gap:8px; }
    .panel-hero.has-cover .panel-head {
      position:absolute; bottom:0; left:0; right:0; z-index:2;
      background:linear-gradient(to bottom, transparent 0%, rgba(14,15,19,.82) 38%, rgba(14,15,19,.97) 100%);
      padding:48px 20px 16px;
    }
    .panel-hero.no-cover .panel-head {
      position:static; padding:16px 20px;
      border-bottom:1px solid var(--border);
      background:var(--panel);
    }
    .panel-head h2 { font-size:16px; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .panel-hero.has-cover .panel-head h2 { color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.7); }
    .panel-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; }
    .panel-close:hover { color:var(--ink); }
    .panel-hero.has-cover .panel-close { color:rgba(255,255,255,.7); }
    .panel-hero.has-cover .panel-close:hover { color:#fff; }
    .panel-nav { background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-size:18px; line-height:1; border-radius:4px; padding:2px 8px; transition:color .15s,border-color .15s; flex-shrink:0; }
    .panel-nav:hover:not(:disabled) { color:var(--ink); border-color:var(--ink); }
    .panel-nav:disabled { opacity:.25; cursor:default; }
    .panel-hero.has-cover .panel-nav { border-color:rgba(255,255,255,.3); color:rgba(255,255,255,.6); }
    .panel-hero.has-cover .panel-nav:hover:not(:disabled) { border-color:#fff; color:#fff; }
    .chapter-list { overflow-y:auto; padding:8px 0; flex:1; }
    .chapter-row { display:flex; align-items:center; padding:10px 20px; gap:12px; border-bottom:1px solid var(--border); }
    .chapter-row:last-child { border-bottom:none; }
    .chapter-row span { flex:1; font-size:13px; color:var(--ink); }
    .chapter-row a { font-size:12px; padding:4px 10px; border-radius:4px; text-decoration:none; font-weight:500; }
    .btn-read { background:#1a2a3a; color:#6aabdf; }
    .btn-read:hover { background:#2a3a4a; }
    .btn-dl { background:#1a2a1a; color:var(--green); }
    .btn-dl:hover { background:#2a3a2a; }

    .empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }

    /* panel footer / delete */
    .panel-footer { padding:12px 20px; border-top:1px solid var(--border); }
    .panel-footer-row { display:flex; gap:8px; margin-bottom:0; }
    .btn-panel-action { background:none; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:4px; font-size:12px; cursor:pointer; transition:border-color .15s,color .15s; }
    .btn-panel-action:hover { border-color:var(--ink); color:var(--ink); }
    .btn-delete-open { background:none; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:4px; font-size:12px; cursor:pointer; transition:border-color .15s,color .15s; }
    .btn-delete-open:hover { border-color:var(--red); color:var(--red); }
    .delete-confirm { margin-top:10px; }
    .delete-cmd { background:#0e0f13; border:1px solid var(--border); border-radius:4px; padding:8px 12px; font-family:monospace; font-size:11px; color:#f87171; white-space:pre; margin-bottom:10px; }
    .delete-actions { display:flex; gap:8px; }
    .btn-panel { border:none; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:500; }
    .btn-panel-cancel { background:var(--border); color:var(--ink); }
    .btn-panel-danger { background:var(--red); color:#fff; }

    /* cover picker overlay */
    .covers-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:200; flex-direction:column; }
    .covers-overlay.open { display:flex; }
    .covers-header { background:var(--panel); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .covers-header h3 { flex:1; font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .covers-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1; }
    .covers-close:hover { color:var(--ink); }
    .covers-body { overflow-y:auto; flex:1; padding:16px; }
    .covers-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:12px; }
    .cover-card { cursor:pointer; border-radius:6px; overflow:hidden; border:2px solid transparent; transition:border-color .15s,transform .15s; background:var(--panel); }
    .cover-card:hover { border-color:var(--accent); transform:translateY(-2px); }
    .cover-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; }
    .cover-card .cover-meta { font-size:10px; color:var(--muted); padding:4px 6px; text-align:center; }
    .covers-empty { color:var(--muted); font-size:13px; text-align:center; padding:40px; }

    /* panel url bar */
    .panel-url-bar { padding:10px 20px; border-bottom:1px solid var(--border); font-size:13px; }
    .panel-url-bar a { color:var(--accent); text-decoration:none; word-break:break-all; }
    .panel-url-bar a:hover { text-decoration:underline; }
    .url-input-row { display:flex; gap:8px; align-items:center; }
    .url-input-row input { flex:1; background:#0e0f13; border:1px solid var(--border); color:var(--ink); padding:6px 10px; border-radius:4px; font-size:13px; min-width:0; }
    .url-input-row input:focus { outline:none; border-color:var(--accent); }
    .btn-url { border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:500; white-space:nowrap; }
    .btn-url-save { background:var(--accent); color:#111; }
    .btn-url-ddg { background:var(--border); color:var(--ink); }

    /* continue button on card */
    .card-continue { margin-top:6px; }
    .continue-btn { display:block; background:#1a2a1a; color:var(--green); font-size:11px; padding:3px 8px; border-radius:4px; text-decoration:none; text-align:center; transition:background .15s; }
    .continue-btn:hover { background:#253525; }

    /* alias chip suggestions */
    .alias-chip { background:var(--border); color:var(--ink); border:1px solid var(--border); padding:3px 10px; border-radius:12px; cursor:pointer; font-size:12px; transition:background .15s,border-color .15s; }
    .alias-chip:hover { background:var(--accent); color:#111; border-color:var(--accent); }
    .alias-chip.en { border-color:var(--green); }
    .alias-chip.ja { border-color:#8ab4f8; }
    .btn-panel-primary { background:var(--accent); color:#111; }

    /* mobile */
    @media (max-width:600px) {
      header { padding:10px 14px; }
      header h1 { font-size:16px; }

      .filters { padding:10px 14px 0; overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
      .filters::-webkit-scrollbar { display:none; }
      .filter-btn { flex-shrink:0; padding:5px 12px; }

      .stats { padding:6px 14px; }

      .grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; padding:10px 14px 32px; }

      .panel-footer-row { flex-wrap:wrap; }

      .chapter-row { padding:10px 14px; }
      .chapter-row a { padding:6px 12px; font-size:13px; }

      .continue-btn { font-size:14px; padding:8px 10px; }

      .delete-cmd { white-space:pre-wrap; word-break:break-all; }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 Manga Library</h1>
  <span id="saving">saving…</span>
  <a href="/admin">Admin</a>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="favorites">⭐ Favorites</button>
  <button class="filter-btn" data-filter="reading">📖 Reading</button>
  <button class="filter-btn" data-filter="active">Downloading</button>
  <button class="filter-btn" data-filter="completed">Completed</button>
  <button class="filter-btn" data-filter="hiatus">Hiatus</button>
  <button class="filter-btn" data-filter="archived">Archived</button>
  <button class="filter-btn" data-filter="read">✓ Read</button>
  <button class="filter-btn" data-filter="hidden">👁 Hidden</button>
</div>
<div class="stats" id="stats"></div>

<div class="grid" id="grid"></div>

<div class="covers-overlay" id="covers-overlay">
  <div class="covers-header">
    <h3 id="covers-title"></h3>
    <button class="covers-close" id="covers-close">✕</button>
  </div>
  <div class="covers-body">
    <div class="covers-grid" id="covers-grid"></div>
  </div>
</div>

<div class="panel-overlay" id="overlay">
  <div class="panel">
    <div class="panel-hero no-cover" id="panel-hero">
      <div class="panel-head">
        <button class="panel-nav" id="panel-prev" title="Previous (←)">‹</button>
        <h2 id="panel-title"></h2>
        <button class="panel-nav" id="panel-next" title="Next (→)">›</button>
        <button class="panel-close" id="panel-close">✕</button>
      </div>
    </div>
    <div class="panel-url-bar" id="panel-url-bar"></div>
    <div class="chapter-list" id="chapter-list"></div>
    <div class="panel-footer" id="panel-footer"></div>
  </div>
</div>

<script>
  let allManga = [];
  let visibleManga = [];
  let currentPanelIndex = -1;
  const _validFilters = new Set(['all','favorites','reading','active','completed','hiatus','archived','read','hidden']);
  const _urlFilter = new URLSearchParams(location.search).get('filter');
  let currentFilter = _validFilters.has(_urlFilter) ? _urlFilter : 'all';

  let _pending = 0;
  async function apiFetch(url, opts = {}) {
    _pending++;
    if (_pending === 1) document.getElementById('saving').classList.add('active');
    try {
      return await fetch(url, opts);
    } finally {
      _pending--;
      if (_pending === 0) document.getElementById('saving').classList.remove('active');
    }
  }

  async function load() {
    try {
      allManga = await fetch('/api/manga').then(r => r.json());
      render();
    } catch(e) {
      document.getElementById('grid').innerHTML = '<div class="empty">Failed to load.</div>';
    }
  }

  function render() {
    const visible = m => !m.hidden && !m.read;
    const manga = currentFilter === 'hidden' ? allManga.filter(m => m.hidden)
      : currentFilter === 'read' ? allManga.filter(m => m.read)
      : currentFilter === 'reading' ? allManga.filter(m => m.last_read_chapter && !m.read && !m.hidden)
      : currentFilter === 'all' ? allManga.filter(visible)
      : currentFilter === 'favorites' ? allManga.filter(m => m.favorited && visible(m))
      : allManga.filter(m => m.status === currentFilter && visible(m));
    const active = allManga.filter(m => m.status === 'active').length;
    const archived = allManga.filter(m => m.status === 'archived').length;
    document.getElementById('stats').textContent = `${allManga.length} series · ${active} active · ${archived} archived`;

    visibleManga = manga;

    if (!manga.length) {
      document.getElementById('grid').innerHTML = '<div class="empty">No manga found.</div>';
      return;
    }

    document.getElementById('grid').innerHTML = manga.map(m => {
      const thumbUrl = `/thumbnail/${esc(m.id)}${m._coverTs ? '?t=' + m._coverTs : ''}`;
      const thumb = m.has_thumbnail
        ? `<div class="thumb" style="background-image:url('${thumbUrl}')"></div>`
        : `<div class="thumb">📖</div>`;
      const badgeLabel = m.status === 'active' ? 'downloading' : m.status;
      const badge = `<span class="badge badge-${esc(m.status)}">${esc(badgeLabel)}</span>`;
      const ch = m.last_chapter_on_disk != null ? `<span class="ch-num">Ch.${m.last_chapter_on_disk}</span>` : '';
      const starClass = m.favorited ? 'star-btn on' : 'star-btn';
      const cardClass = m.status === 'archived' ? 'card archived' : 'card';
      const dtitle = displayTitle(m);
      let continueBtn = '';
      if (m.last_read_chapter) {
        const pageStr = m.last_read_page && m.last_read_page > 1 ? `?page=${m.last_read_page}` : '';
        const contUrl = `/read/${encodeURIComponent(m.id)}/${encodeURIComponent(m.last_read_chapter)}${pageStr}`;
        const numMatch = m.last_read_chapter.match(/[\s\-]+(\d+(?:\.\d+)?)/);
        const chLabel = numMatch ? `Ch.${numMatch[1]}` : 'chapter';
        const pgLabel = m.last_read_page && m.last_read_page > 1 ? ` · p.${m.last_read_page}` : '';
        continueBtn = `<div class="card-continue"><a class="continue-btn" href="${contUrl}" onclick="event.stopPropagation()">▶ Continue ${chLabel}${pgLabel}</a></div>`;
      }
      return `<div class="${cardClass}" data-id="${esc(m.id)}" data-title="${esc(dtitle)}">
        <div class="thumb-wrap">
          ${thumb}
          <button class="${starClass}" data-id="${esc(m.id)}" data-fav="${m.favorited ? 1 : 0}" title="Favorite">⭐</button>
        </div>
        <div class="card-body">
          <div class="card-title">${esc(dtitle)}</div>
          <div class="card-meta">${badge}${ch}</div>
          ${continueBtn}
        </div>
      </div>`;
    }).join('');

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openPanel(card.dataset.id, card.dataset.title));
    });

    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const newVal = btn.dataset.fav === '1' ? 0 : 1;
        const resp = await apiFetch(`/api/manga/${id}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({favorited: newVal})
        });
        if (resp.ok) {
          btn.dataset.fav = String(newVal);
          btn.classList.toggle('on', newVal === 1);
          const m = allManga.find(x => x.id === id);
          if (m) m.favorited = Boolean(newVal);
        }
      });
    });
  }

  function updatePanelNav() {
    document.getElementById('panel-prev').disabled = currentPanelIndex <= 0;
    document.getElementById('panel-next').disabled = currentPanelIndex >= visibleManga.length - 1;
  }

  function navigatePanel(delta) {
    const next = currentPanelIndex + delta;
    if (next < 0 || next >= visibleManga.length) return;
    currentPanelIndex = next;
    const m = visibleManga[currentPanelIndex];
    openPanel(m.id, displayTitle(m));
  }

  async function openPanel(id, title) {
    currentPanelIndex = visibleManga.findIndex(m => m.id === id);
    updatePanelNav();
    document.getElementById('panel-title').textContent = title;
    document.getElementById('panel-url-bar').innerHTML = '';
    document.getElementById('panel-footer').innerHTML = '';
    const heroEl = document.getElementById('panel-hero');
    heroEl.querySelectorAll('img').forEach(el => el.remove());
    heroEl.className = 'panel-hero no-cover';
    document.getElementById('chapter-list').innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">Loading…</div>';
    document.getElementById('overlay').classList.add('open');

    try {
      const data = await fetch(`/api/manga/${encodeURIComponent(id)}`).then(r => r.json());

      // Refresh panel title with alias if set
      document.getElementById('panel-title').textContent = data.alias || data.title || title;

      // Hero cover image
      if (data.has_thumbnail) {
        const m = allManga.find(x => x.id === id);
        const ts = m && m._coverTs ? '?t=' + m._coverTs : '';
        const hero = document.getElementById('panel-hero');
        const img = document.createElement('img');
        img.className = 'panel-hero-img';
        img.alt = 'cover';
        img.src = `/cover/${encodeURIComponent(id)}${ts}`;
        hero.insertBefore(img, hero.firstChild);
        hero.className = 'panel-hero has-cover';
      }

      // URL bar
      const urlBar = document.getElementById('panel-url-bar');
      const mangaUrl = data.url || '';
      const hasRealUrl = mangaUrl && !mangaUrl.startsWith('local:');

      function showUrlEdit(current) {
        urlBar.innerHTML = `<div class="url-input-row">
          <input type="url" id="url-input" placeholder="Paste MangaDex URL…" value="${esc(current)}">
          <button class="btn-url btn-url-save" id="url-save">Save</button>
          <button class="btn-url btn-url-ddg" id="url-find">🔍 Find</button>
        </div>`;
        const input = document.getElementById('url-input');
        input.focus();
        if (current) input.select();
        async function saveUrl() {
          const newUrl = input.value.trim();
          if (!newUrl) return;
          const saveBtn = document.getElementById('url-save');
          saveBtn.disabled = true;
          const r = await apiFetch(`/api/manga/${encodeURIComponent(id)}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: newUrl})
          });
          if (r.ok) {
            showUrlLink(newUrl);
            const m = allManga.find(x => x.id === id);
            if (m) { m.url = newUrl; m.source_type = newUrl.includes('mangadex.org') ? 'mangadex' : 'local'; }
          } else {
            const err = await r.json().catch(() => ({}));
            const detail = err.detail || {};
            saveBtn.disabled = false;
            if (r.status === 409 && detail.conflict) {
              const mine = detail.mine;
              const other = detail.conflict;
              const loser = mine.chapter_count <= other.chapter_count ? mine : other;
              const keeper = loser === mine ? other : mine;
              const box = document.createElement('div');
              box.style.cssText = 'margin-top:8px;background:#1a1520;border:1px solid #3a2a3a;border-radius:6px;padding:10px;font-size:12px';
              box.innerHTML = `
                <div style="color:var(--yellow);margin-bottom:8px">⚠ URL conflict</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
                  <div>
                    <div style="color:var(--muted);font-size:10px;text-transform:uppercase;margin-bottom:2px">This entry</div>
                    <div style="font-weight:500">${esc(mine.title)}</div>
                    <div style="color:var(--muted)">${mine.chapter_count} chapters</div>
                  </div>
                  <div>
                    <div style="color:var(--muted);font-size:10px;text-transform:uppercase;margin-bottom:2px">Other entry</div>
                    <div style="font-weight:500">${esc(other.title)}</div>
                    <div style="color:var(--muted)">${other.chapter_count} chapters</div>
                  </div>
                </div>
                <button id="resolve-url-conflict" style="background:var(--red);color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;width:100%">
                  Delete "${esc(loser.title)}" (${loser.chapter_count} ch, fewer files)
                </button>`;
              input.closest('.url-input-row').after(box);
              document.getElementById('resolve-url-conflict').addEventListener('click', async () => {
                const btn = document.getElementById('resolve-url-conflict');
                btn.disabled = true; btn.textContent = 'Deleting…';
                const delUrl = `/api/manga/${encodeURIComponent(loser.id)}${loser.folder_exists ? '?delete_folder=true' : ''}`;
                const dr = await apiFetch(delUrl, { method: 'DELETE' });
                if (!dr.ok) { btn.textContent = 'Delete failed'; return; }
                if (loser.id === id) {
                  // deleted the current panel entry — close and remove
                  closePanel();
                  allManga = allManga.filter(m => m.id !== id);
                  render();
                } else {
                  // deleted the other entry — now retry the URL save
                  allManga = allManga.filter(m => m.id !== loser.id);
                  const retry = await apiFetch(`/api/manga/${encodeURIComponent(id)}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: newUrl})
                  });
                  if (retry.ok) {
                    showUrlLink(newUrl);
                    const m = allManga.find(x => x.id === id);
                    if (m) { m.url = newUrl; m.source_type = newUrl.includes('mangadex.org') ? 'mangadex' : 'local'; }
                  }
                }
              });
            } else {
              const msg = document.createElement('div');
              msg.style.cssText = 'font-size:11px;color:var(--red);margin-top:4px';
              msg.textContent = (typeof detail === 'string' ? detail : detail.message) || 'Failed to save URL';
              input.after(msg);
            }
          }
        }
        document.getElementById('url-save').addEventListener('click', saveUrl);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') saveUrl(); });
        document.getElementById('url-find').addEventListener('click', async () => {
          const btn = document.getElementById('url-find');
          btn.textContent = '…';
          btn.disabled = true;
          try {
            const r = await fetch(`/api/search?title=${encodeURIComponent(data.title || title)}`);
            if (r.ok) {
              const found = await r.json();
              document.getElementById('url-input').value = found.url;
            } else {
              btn.textContent = 'Not found';
              setTimeout(() => { btn.textContent = '🔍 Find'; btn.disabled = false; }, 2000);
              return;
            }
          } catch(e) {
            btn.textContent = 'Error';
            setTimeout(() => { btn.textContent = '🔍 Find'; btn.disabled = false; }, 2000);
            return;
          }
          btn.textContent = '🔍 Find';
          btn.disabled = false;
        });
      }

      function showUrlLink(url) {
        urlBar.innerHTML = `<div class="url-input-row">
          <a href="${esc(url)}" target="_blank" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(url)}</a>
          <button class="btn-url btn-url-ddg" id="url-edit">Edit</button>
        </div>`;
        document.getElementById('url-edit').addEventListener('click', () => showUrlEdit(url));
      }

      if (hasRealUrl) {
        showUrlLink(mangaUrl);
      } else {
        showUrlEdit(mangaUrl.startsWith('local:') ? '' : mangaUrl);
      }

      // Panel footer: hide + delete
      const footer = document.getElementById('panel-footer');
      const folderPath = data.folder_path || '';
      const folderExists = data.folder_exists || false;
      const isHidden = data.hidden || false;
      const isRead = data.read || false;
      const isDownloadEnabled = data.download_enabled !== false;
      const hasProgress = !!data.last_read_chapter;
      const deleteCmd = folderExists
        ? `rm -rf "${folderPath}"\n# + remove DB entry`
        : `# No folder on disk\n# Remove DB entry only`;
      const isMangadex = data.source_type === 'mangadex' && !mangaUrl.startsWith('local:');
      const currentAlias = data.alias || '';
      footer.innerHTML = `
        <div class="panel-footer-row">
          <button class="btn-panel-action" id="hide-btn">${isHidden ? '👁 Unhide' : '👁 Hide'}</button>
          <button class="btn-panel-action" id="read-btn">${isRead ? '✓ Unread' : '✓ Read'}</button>
          <button class="btn-panel-action" id="download-btn">${isDownloadEnabled ? '⏸ Pause' : '▶ Resume'}</button>
          ${hasProgress ? `<button class="btn-panel-action" id="clear-progress-btn">▶ Clear progress</button>` : ''}
          ${isMangadex ? `<button class="btn-panel-action" id="cover-btn">🖼 Cover</button>` : ''}
          <button class="btn-panel-action" id="alias-btn">✏ Alias${currentAlias ? ' ✓' : ''}</button>
          <button class="btn-delete-open" id="delete-open">🗑 Delete…</button>
        </div>
        <div id="alias-section" style="display:none;margin-top:10px">
          <div class="url-input-row" style="margin-bottom:8px">
            <input type="text" id="alias-input" value="${esc(currentAlias)}" placeholder="Display name… (empty to clear)">
            ${isMangadex ? `<button class="btn-url btn-url-ddg" id="alias-fetch">Fetch titles</button>` : ''}
          </div>
          <div id="alias-suggestions" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
          <div class="delete-actions">
            <button class="btn-panel btn-panel-cancel" id="alias-cancel">Cancel</button>
            <button class="btn-panel btn-panel-primary" id="alias-save">Save</button>
          </div>
        </div>
        <div class="delete-confirm" id="delete-confirm" style="display:none;margin-top:10px">
          <div class="delete-cmd">${esc(deleteCmd)}</div>
          <div class="delete-actions">
            <button class="btn-panel btn-panel-cancel" id="delete-cancel">Cancel</button>
            <button class="btn-panel btn-panel-danger" id="delete-yes">Yes, Delete</button>
          </div>
        </div>`;

      if (isMangadex) {
        document.getElementById('cover-btn').addEventListener('click', () => openCovers(id, data.title || title));
      }

      // Alias button
      document.getElementById('alias-btn').addEventListener('click', () => {
        const section = document.getElementById('alias-section');
        const isOpen = section.style.display !== 'none';
        section.style.display = isOpen ? 'none' : 'block';
        if (!isOpen) {
          document.getElementById('delete-confirm').style.display = 'none';
          document.getElementById('delete-open').style.display = '';
          document.getElementById('alias-input').focus();
          document.getElementById('alias-input').select();
        }
      });

      document.getElementById('alias-cancel').addEventListener('click', () => {
        document.getElementById('alias-section').style.display = 'none';
      });

      async function saveAlias() {
        const btn = document.getElementById('alias-save');
        const newAlias = document.getElementById('alias-input').value.trim();
        btn.disabled = true;
        const r = await apiFetch(`/api/manga/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({alias: newAlias})
        });
        if (r.ok) {
          const m = allManga.find(x => x.id === id);
          if (m) m.alias = newAlias || null;
          document.getElementById('alias-section').style.display = 'none';
          document.getElementById('alias-btn').textContent = `✏ Alias${newAlias ? ' ✓' : ''}`;
          document.getElementById('panel-title').textContent = newAlias || data.title || title;
          render();
        } else {
          btn.disabled = false;
        }
      }

      document.getElementById('alias-save').addEventListener('click', saveAlias);
      document.getElementById('alias-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveAlias(); });

      if (isMangadex) {
        document.getElementById('alias-fetch').addEventListener('click', async () => {
          const btn = document.getElementById('alias-fetch');
          btn.textContent = '…';
          btn.disabled = true;
          const sugDiv = document.getElementById('alias-suggestions');
          try {
            const r = await fetch(`/api/manga/${encodeURIComponent(id)}/titles`);
            if (!r.ok) throw new Error('fetch failed');
            const titles = await r.json();
            if (!titles.length) {
              sugDiv.textContent = 'No titles found.';
            } else {
              sugDiv.innerHTML = titles.map((t, i) => {
                const cls = t.locale.startsWith('en') ? 'alias-chip en' : t.locale.startsWith('ja') ? 'alias-chip ja' : 'alias-chip';
                return `<button class="${cls}" data-idx="${i}">${esc(t.title)} <span style="font-size:10px;opacity:.6">${esc(t.locale)}</span></button>`;
              }).join('');
              sugDiv.querySelectorAll('.alias-chip').forEach((chip, i) => {
                chip.addEventListener('click', () => {
                  document.getElementById('alias-input').value = titles[i].title;
                  document.getElementById('alias-input').focus();
                });
              });
            }
          } catch(e) {
            sugDiv.textContent = 'Failed to fetch titles.';
          }
          btn.textContent = 'Fetch titles';
          btn.disabled = false;
        });
      }

      if (hasProgress) {
        document.getElementById('clear-progress-btn').addEventListener('click', async () => {
          const btn = document.getElementById('clear-progress-btn');
          btn.disabled = true;
          const r = await apiFetch(`/api/manga/${encodeURIComponent(id)}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({clear_progress: true})
          });
          if (r.ok) {
            const m = allManga.find(x => x.id === id);
            if (m) { m.last_read_chapter = null; m.last_read_page = null; }
            btn.remove();
            render();
          } else {
            btn.disabled = false;
          }
        });
      }

      document.getElementById('read-btn').addEventListener('click', async () => {
        const newVal = isRead ? 0 : 1;
        const r = await apiFetch(`/api/manga/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({read: newVal})
        });
        if (r.ok) {
          const m = allManga.find(x => x.id === id);
          if (m) m.read = Boolean(newVal);
          closePanel();
          render();
        }
      });

      document.getElementById('hide-btn').addEventListener('click', async () => {
        const btn = document.getElementById('hide-btn');
        const newVal = isHidden ? 0 : 1;
        const r = await apiFetch(`/api/manga/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({hidden: newVal})
        });
        if (r.ok) {
          const m = allManga.find(x => x.id === id);
          if (m) m.hidden = Boolean(newVal);
          btn.textContent = newVal ? '👁 Unhide' : '👁 Hide';
          closePanel();
          render();
        }
      });

      document.getElementById('download-btn').addEventListener('click', async () => {
        const btn = document.getElementById('download-btn');
        const newVal = isDownloadEnabled ? 0 : 1;
        btn.disabled = true;
        const r = await apiFetch(`/api/manga/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({download_enabled: newVal})
        });
        if (r.ok) {
          const m = allManga.find(x => x.id === id);
          if (m) m.download_enabled = Boolean(newVal);
          btn.textContent = newVal ? '⏸ Pause' : '▶ Resume';
          btn.disabled = false;
        } else {
          btn.disabled = false;
        }
      });

      document.getElementById('delete-open').addEventListener('click', () => {
        document.getElementById('delete-confirm').style.display = 'block';
        document.getElementById('delete-open').style.display = 'none';
      });
      document.getElementById('delete-cancel').addEventListener('click', () => {
        document.getElementById('delete-confirm').style.display = 'none';
        document.getElementById('delete-open').style.display = '';
      });
      document.getElementById('delete-yes').addEventListener('click', async () => {
        const btn = document.getElementById('delete-yes');
        btn.disabled = true;
        btn.textContent = 'Deleting…';
        const url = `/api/manga/${encodeURIComponent(id)}${folderExists ? '?delete_folder=true' : ''}`;
        const r = await apiFetch(url, { method: 'DELETE' });
        if (r.ok) {
          closePanel();
          allManga = allManga.filter(m => m.id !== id);
          render();
        } else {
          btn.disabled = false;
          btn.textContent = 'Yes, Delete';
        }
      });

      // Chapter list
      const chapters = data.chapters || [];
      if (!chapters.length) {
        document.getElementById('chapter-list').innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">No chapters downloaded yet.</div>';
        return;
      }
      const chapterListEl = document.getElementById('chapter-list');
      const startRow = !data.last_read_chapter ? (() => {
        const first = chapters[0];
        const startUrl = `/read/${encodeURIComponent(id)}/${encodeURIComponent(first)}`;
        return `<div style="padding:12px 20px;border-bottom:1px solid var(--border)">
          <a class="btn-read" href="${startUrl}" data-file="${esc(first)}" id="start-btn" style="display:block;text-align:center;padding:8px;font-size:13px">▶ Start reading</a>
        </div>`;
      })() : '';
      chapterListEl.innerHTML = startRow + chapters.slice().reverse().map(f => {
        const readUrl = `/read/${encodeURIComponent(id)}/${encodeURIComponent(f)}`;
        const dlUrl = `/cbz/${encodeURIComponent(id)}/${encodeURIComponent(f)}?dl=1`;
        return `<div class="chapter-row" data-file="${esc(f)}">
          <span>${esc(f.replace(/\.cbz$/, ''))}</span>
          <a class="btn-read" href="${readUrl}" data-file="${esc(f)}">Read</a>
          <a class="btn-dl" href="${dlUrl}">↓</a>
        </div>`;
      }).join('');
      chapterListEl.querySelectorAll('a.btn-read').forEach(a => {
        a.addEventListener('click', () => {
          const file = a.dataset.file;
          apiFetch(`/api/manga/${encodeURIComponent(id)}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({last_read_chapter: file})
          }).then(() => {
            const m = allManga.find(x => x.id === id);
            if (m) { m.last_read_chapter = file; m.last_read_page = null; }
          }).catch(() => {});
        });
      });
    } catch(e) {
      document.getElementById('chapter-list').innerHTML = '<div style="padding:20px;color:var(--red);font-size:13px">Failed to load chapters.</div>';
    }
  }

  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('panel-prev').addEventListener('click', () => navigatePanel(-1));
  document.getElementById('panel-next').addEventListener('click', () => navigatePanel(1));
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closePanel();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('overlay').classList.contains('open')) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); navigatePanel(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); navigatePanel(1); }
    else if (e.key === 'Escape') closePanel();
  });

  function closePanel() {
    document.getElementById('overlay').classList.remove('open');
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    if (btn.dataset.filter === currentFilter) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      const params = currentFilter === 'all' ? '' : '?filter=' + currentFilter;
      history.replaceState(null, '', location.pathname + params);
      render();
    });
  });

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function displayTitle(m) {
    return m.alias || m.title || m.url || '';
  }

  // --- cover picker ---

  document.getElementById('covers-close').addEventListener('click', () => {
    document.getElementById('covers-overlay').classList.remove('open');
  });

  async function openCovers(mangaId, mangaTitle) {
    const grid = document.getElementById('covers-grid');
    document.getElementById('covers-title').textContent = mangaTitle;
    grid.innerHTML = '<div class="covers-empty">Loading covers…</div>';
    document.getElementById('covers-overlay').classList.add('open');

    let covers;
    try {
      const r = await fetch(`/api/manga/${encodeURIComponent(mangaId)}/covers`);
      covers = await r.json();
    } catch(e) {
      grid.innerHTML = '<div class="covers-empty">Failed to load covers.</div>';
      return;
    }
    if (!covers.length) {
      grid.innerHTML = '<div class="covers-empty">No covers found on MangaDex.</div>';
      return;
    }

    grid.innerHTML = covers.map((c, i) => {
      const label = c.volume ? `Vol. ${esc(c.volume)}` : (c.locale ? esc(c.locale) : '—');
      return `<div class="cover-card" data-idx="${i}">
        <img src="${esc(c.thumb_url)}" loading="lazy" alt="${label}">
        <div class="cover-meta">${label}</div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.cover-card').forEach(card => {
      card.addEventListener('click', async () => {
        const c = covers[+card.dataset.idx];
        card.style.borderColor = 'var(--accent)';
        card.style.opacity = '.5';
        try {
          const r = await apiFetch(`/api/manga/${encodeURIComponent(mangaId)}/cover`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cover_url: c.cover_url})
          });
          if (r.ok) {
            const ts = Date.now();
            const m = allManga.find(x => x.id === mangaId);
            if (m) { m.has_thumbnail = true; m.cover_url = c.cover_url; m._coverTs = ts; }
            // Update the hero image live without reopening the panel
            const heroImg = document.querySelector('#panel-hero .panel-hero-img');
            if (heroImg) heroImg.src = `/cover/${encodeURIComponent(mangaId)}?t=${ts}`;
            document.getElementById('covers-overlay').classList.remove('open');
            render();
          } else {
            card.style.borderColor = 'var(--red)';
            card.style.opacity = '1';
          }
        } catch(e) {
          card.style.borderColor = 'var(--red)';
          card.style.opacity = '1';
        }
      });
    });
  }

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
