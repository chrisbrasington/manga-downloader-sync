<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Manga Library</title>
  <style>
    :root {
      --bg: #0e0f13;
      --panel: #15171d;
      --border: #252730;
      --ink: #d4d6e0;
      --muted: #6b7080;
      --accent: #e2b96f;
      --green: #4caf77;
      --yellow: #e2b96f;
      --red: #e05c5c;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

    header { background:var(--panel); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:16px; }
    header h1 { font-size:18px; font-weight:600; color:var(--accent); flex:1; }
    header a { color:var(--muted); text-decoration:none; font-size:14px; }
    header a:hover { color:var(--ink); }

    .filters { padding:14px 20px 0; display:flex; gap:8px; }
    .filter-btn { background:var(--panel); border:1px solid var(--border); color:var(--muted); padding:5px 14px; border-radius:20px; cursor:pointer; font-size:13px; transition:all .15s; }
    .filter-btn:hover, .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#111; }

    .stats { padding:8px 20px; font-size:13px; color:var(--muted); }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:16px; padding:16px 20px 32px; }

    .card { background:var(--panel); border:1px solid var(--border); border-radius:8px; overflow:hidden; cursor:pointer; transition:transform .15s,border-color .15s; }
    .card:hover { transform:translateY(-2px); border-color:var(--accent); }
    .thumb { width:100%; aspect-ratio:2/3; background:#1e202a center/cover no-repeat; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--muted); }
    .card-body { padding:10px; }
    .card-title { font-size:13px; font-weight:500; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:6px; }
    .card-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .badge { font-size:11px; padding:2px 7px; border-radius:10px; font-weight:500; }
    .badge-active { background:#1a3a2a; color:var(--green); }
    .badge-completed { background:#2a2a2a; color:var(--muted); }
    .badge-hiatus { background:#3a2a1a; color:var(--yellow); }
    .badge-archived { background:#1a1a1a; color:#444; }
    .card.archived { opacity:.55; }
    .card.archived:hover { opacity:.8; }
    .ch-num { font-size:11px; color:var(--muted); margin-left:auto; }
    .star-btn { background:none; border:none; cursor:pointer; font-size:16px; line-height:1; padding:0; opacity:.5; position:absolute; top:6px; right:6px; transition:opacity .15s,transform .15s; }
    .star-btn:hover, .star-btn.on { opacity:1; }
    .star-btn.on { transform:scale(1.15); }
    .thumb-wrap { position:relative; }

    /* chapter panel */
    .panel-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; }
    .panel-overlay.open { display:flex; align-items:flex-end; justify-content:center; }
    .panel { background:var(--panel); border-radius:12px 12px 0 0; width:100%; max-width:600px; max-height:80vh; display:flex; flex-direction:column; }
    .panel-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .panel-head h2 { font-size:15px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .panel-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; }
    .panel-close:hover { color:var(--ink); }
    .chapter-list { overflow-y:auto; padding:8px 0; flex:1; }
    .chapter-row { display:flex; align-items:center; padding:10px 20px; gap:12px; border-bottom:1px solid var(--border); }
    .chapter-row:last-child { border-bottom:none; }
    .chapter-row span { flex:1; font-size:13px; color:var(--ink); }
    .chapter-row a { font-size:12px; padding:4px 10px; border-radius:4px; text-decoration:none; font-weight:500; }
    .btn-read { background:#1a2a3a; color:#6aabdf; }
    .btn-read:hover { background:#2a3a4a; }
    .btn-dl { background:#1a2a1a; color:var(--green); }
    .btn-dl:hover { background:#2a3a2a; }

    .empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }

    /* panel footer / delete */
    .panel-footer { padding:12px 20px; border-top:1px solid var(--border); }
    .panel-footer-row { display:flex; gap:8px; margin-bottom:0; }
    .btn-panel-action { background:none; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:4px; font-size:12px; cursor:pointer; transition:border-color .15s,color .15s; }
    .btn-panel-action:hover { border-color:var(--ink); color:var(--ink); }
    .btn-delete-open { background:none; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:4px; font-size:12px; cursor:pointer; transition:border-color .15s,color .15s; }
    .btn-delete-open:hover { border-color:var(--red); color:var(--red); }
    .delete-confirm { margin-top:10px; }
    .delete-cmd { background:#0e0f13; border:1px solid var(--border); border-radius:4px; padding:8px 12px; font-family:monospace; font-size:11px; color:#f87171; white-space:pre; margin-bottom:10px; }
    .delete-actions { display:flex; gap:8px; }
    .btn-panel { border:none; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:500; }
    .btn-panel-cancel { background:var(--border); color:var(--ink); }
    .btn-panel-danger { background:var(--red); color:#fff; }

    /* cover picker overlay */
    .covers-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:200; flex-direction:column; }
    .covers-overlay.open { display:flex; }
    .covers-header { background:var(--panel); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .covers-header h3 { flex:1; font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .covers-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1; }
    .covers-close:hover { color:var(--ink); }
    .covers-body { overflow-y:auto; flex:1; padding:16px; }
    .covers-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:12px; }
    .cover-card { cursor:pointer; border-radius:6px; overflow:hidden; border:2px solid transparent; transition:border-color .15s,transform .15s; background:var(--panel); }
    .cover-card:hover { border-color:var(--accent); transform:translateY(-2px); }
    .cover-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; }
    .cover-card .cover-meta { font-size:10px; color:var(--muted); padding:4px 6px; text-align:center; }
    .covers-empty { color:var(--muted); font-size:13px; text-align:center; padding:40px; }

    /* panel url bar */
    .panel-url-bar { padding:10px 20px; border-bottom:1px solid var(--border); font-size:13px; }
    .panel-url-bar a { color:var(--accent); text-decoration:none; word-break:break-all; }
    .panel-url-bar a:hover { text-decoration:underline; }
    .url-input-row { display:flex; gap:8px; align-items:center; }
    .url-input-row input { flex:1; background:#0e0f13; border:1px solid var(--border); color:var(--ink); padding:6px 10px; border-radius:4px; font-size:13px; min-width:0; }
    .url-input-row input:focus { outline:none; border-color:var(--accent); }
    .btn-url { border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:500; white-space:nowrap; }
    .btn-url-save { background:var(--accent); color:#111; }
    .btn-url-ddg { background:var(--border); color:var(--ink); }
  </style>
</head>
<body>

<header>
  <h1>📚 Manga Library</h1>
  <a href="/admin">Admin</a>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="favorites">⭐ Favorites</button>
  <button class="filter-btn" data-filter="active">Downloading</button>
  <button class="filter-btn" data-filter="completed">Completed</button>
  <button class="filter-btn" data-filter="hiatus">Hiatus</button>
  <button class="filter-btn" data-filter="archived">Archived</button>
  <button class="filter-btn" data-filter="read">✓ Read</button>
  <button class="filter-btn" data-filter="hidden">👁 Hidden</button>
</div>
<div class="stats" id="stats"></div>

<div class="grid" id="grid"></div>

<div class="covers-overlay" id="covers-overlay">
  <div class="covers-header">
    <h3 id="covers-title"></h3>
    <button class="covers-close" id="covers-close">✕</button>
  </div>
  <div class="covers-body">
    <div class="covers-grid" id="covers-grid"></div>
  </div>
</div>

<div class="panel-overlay" id="overlay">
  <div class="panel">
    <div class="panel-head">
      <h2 id="panel-title"></h2>
      <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div class="panel-url-bar" id="panel-url-bar"></div>
    <div class="chapter-list" id="chapter-list"></div>
    <div class="panel-footer" id="panel-footer"></div>
  </div>
</div>

<script>
  let allManga = [];
  let currentFilter = 'all';

  async function load() {
    try {
      allManga = await fetch('/api/manga').then(r => r.json());
      render();
    } catch(e) {
      document.getElementById('grid').innerHTML = '<div class="empty">Failed to load.</div>';
    }
  }

  function render() {
    const visible = m => !m.hidden && !m.read;
    const manga = currentFilter === 'hidden' ? allManga.filter(m => m.hidden)
      : currentFilter === 'read' ? allManga.filter(m => m.read)
      : currentFilter === 'all' ? allManga.filter(visible)
      : currentFilter === 'favorites' ? allManga.filter(m => m.favorited && visible(m))
      : allManga.filter(m => m.status === currentFilter && visible(m));
    const active = allManga.filter(m => m.status === 'active').length;
    const archived = allManga.filter(m => m.status === 'archived').length;
    document.getElementById('stats').textContent = `${allManga.length} series · ${active} active · ${archived} archived`;

    if (!manga.length) {
      document.getElementById('grid').innerHTML = '<div class="empty">No manga found.</div>';
      return;
    }

    document.getElementById('grid').innerHTML = manga.map(m => {
      const thumb = m.has_thumbnail
        ? `<div class="thumb" style="background-image:url('/thumbnail/${esc(m.id)}')"></div>`
        : `<div class="thumb">📖</div>`;
      const badgeLabel = m.status === 'active' ? 'downloading' : m.status;
      const badge = `<span class="badge badge-${esc(m.status)}">${esc(badgeLabel)}</span>`;
      const ch = m.last_chapter_on_disk != null ? `<span class="ch-num">Ch.${m.last_chapter_on_disk}</span>` : '';
      const starClass = m.favorited ? 'star-btn on' : 'star-btn';
      const cardClass = m.status === 'archived' ? 'card archived' : 'card';
      return `<div class="${cardClass}" data-id="${esc(m.id)}" data-title="${esc(m.title)}">
        <div class="thumb-wrap">
          ${thumb}
          <button class="${starClass}" data-id="${esc(m.id)}" data-fav="${m.favorited ? 1 : 0}" title="Favorite">⭐</button>
        </div>
        <div class="card-body">
          <div class="card-title">${esc(m.title)}</div>
          <div class="card-meta">${badge}${ch}</div>
        </div>
      </div>`;
    }).join('');

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openPanel(card.dataset.id, card.dataset.title));
    });

    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const newVal = btn.dataset.fav === '1' ? 0 : 1;
        const resp = await fetch(`/api/manga/${id}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({favorited: newVal})
        });
        if (resp.ok) {
          btn.dataset.fav = String(newVal);
          btn.classList.toggle('on', newVal === 1);
          const m = allManga.find(x => x.id === id);
          if (m) m.favorited = Boolean(newVal);
        }
      });
    });
  }

  async function openPanel(id, title) {
    document.getElementById('panel-title').textContent = title;
    document.getElementById('panel-url-bar').innerHTML = '';
    document.getElementById('panel-footer').innerHTML = '';
    document.getElementById('chapter-list').innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">Loading…</div>';
    document.getElementById('overlay').classList.add('open');

    try {
      const data = await fetch(`/api/manga/${encodeURIComponent(id)}`).then(r => r.json());

      // URL bar
      const urlBar = document.getElementById('panel-url-bar');
      const mangaUrl = data.url || '';
      const hasRealUrl = mangaUrl && !mangaUrl.startsWith('local:');

      function showUrlEdit(current) {
        urlBar.innerHTML = `<div class="url-input-row">
          <input type="url" id="url-input" placeholder="Paste MangaDex URL…" value="${esc(current)}">
          <button class="btn-url btn-url-save" id="url-save">Save</button>
          <button class="btn-url btn-url-ddg" id="url-find">🔍 Find</button>
        </div>`;
        const input = document.getElementById('url-input');
        input.focus();
        if (current) input.select();
        async function saveUrl() {
          const newUrl = input.value.trim();
          if (!newUrl) return;
          const r = await fetch(`/api/manga/${encodeURIComponent(id)}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: newUrl})
          });
          if (r.ok) {
            showUrlLink(newUrl);
            const m = allManga.find(x => x.id === id);
            if (m) { m.url = newUrl; m.source_type = newUrl.includes('mangadex.org') ? 'mangadex' : 'local'; }
          }
        }
        document.getElementById('url-save').addEventListener('click', saveUrl);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') saveUrl(); });
        document.getElementById('url-find').addEventListener('click', async () => {
          const btn = document.getElementById('url-find');
          btn.textContent = '…';
          btn.disabled = true;
          try {
            const r = await fetch(`/api/search?title=${encodeURIComponent(data.title || title)}`);
            if (r.ok) {
              const found = await r.json();
              document.getElementById('url-input').value = found.url;
            } else {
              btn.textContent = 'Not found';
              setTimeout(() => { btn.textContent = '🔍 Find'; btn.disabled = false; }, 2000);
              return;
            }
          } catch(e) {
            btn.textContent = 'Error';
            setTimeout(() => { btn.textContent = '🔍 Find'; btn.disabled = false; }, 2000);
            return;
          }
          btn.textContent = '🔍 Find';
          btn.disabled = false;
        });
      }

      function showUrlLink(url) {
        urlBar.innerHTML = `<div class="url-input-row">
          <a href="${esc(url)}" target="_blank" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(url)}</a>
          <button class="btn-url btn-url-ddg" id="url-edit">Edit</button>
        </div>`;
        document.getElementById('url-edit').addEventListener('click', () => showUrlEdit(url));
      }

      if (hasRealUrl) {
        showUrlLink(mangaUrl);
      } else {
        showUrlEdit(mangaUrl.startsWith('local:') ? '' : mangaUrl);
      }

      // Panel footer: hide + delete
      const footer = document.getElementById('panel-footer');
      const folderPath = data.folder_path || '';
      const folderExists = data.folder_exists || false;
      const isHidden = data.hidden || false;
      const isRead = data.read || false;
      const deleteCmd = folderExists
        ? `rm -rf "${folderPath}"\n# + remove DB entry`
        : `# No folder on disk\n# Remove DB entry only`;
      const isMangadex = data.source_type === 'mangadex' && !mangaUrl.startsWith('local:');
      footer.innerHTML = `
        <div class="panel-footer-row">
          <button class="btn-panel-action" id="hide-btn">${isHidden ? '👁 Unhide' : '👁 Hide'}</button>
          <button class="btn-panel-action" id="read-btn">${isRead ? '✓ Unread' : '✓ Read'}</button>
          ${isMangadex ? `<button class="btn-panel-action" id="cover-btn">🖼 Cover</button>` : ''}
          <button class="btn-delete-open" id="delete-open">🗑 Delete…</button>
        </div>
        <div class="delete-confirm" id="delete-confirm" style="display:none;margin-top:10px">
          <div class="delete-cmd">${esc(deleteCmd)}</div>
          <div class="delete-actions">
            <button class="btn-panel btn-panel-cancel" id="delete-cancel">Cancel</button>
            <button class="btn-panel btn-panel-danger" id="delete-yes">Yes, Delete</button>
          </div>
        </div>`;

      if (isMangadex) {
        document.getElementById('cover-btn').addEventListener('click', () => openCovers(id, data.title || title));
      }

      document.getElementById('read-btn').addEventListener('click', async () => {
        const newVal = isRead ? 0 : 1;
        const r = await fetch(`/api/manga/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({read: newVal})
        });
        if (r.ok) {
          const m = allManga.find(x => x.id === id);
          if (m) m.read = Boolean(newVal);
          closePanel();
          render();
        }
      });

      document.getElementById('hide-btn').addEventListener('click', async () => {
        const btn = document.getElementById('hide-btn');
        const newVal = isHidden ? 0 : 1;
        const r = await fetch(`/api/manga/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({hidden: newVal})
        });
        if (r.ok) {
          const m = allManga.find(x => x.id === id);
          if (m) m.hidden = Boolean(newVal);
          btn.textContent = newVal ? '👁 Unhide' : '👁 Hide';
          closePanel();
          render();
        }
      });

      document.getElementById('delete-open').addEventListener('click', () => {
        document.getElementById('delete-confirm').style.display = 'block';
        document.getElementById('delete-open').style.display = 'none';
      });
      document.getElementById('delete-cancel').addEventListener('click', () => {
        document.getElementById('delete-confirm').style.display = 'none';
        document.getElementById('delete-open').style.display = '';
      });
      document.getElementById('delete-yes').addEventListener('click', async () => {
        const btn = document.getElementById('delete-yes');
        btn.disabled = true;
        btn.textContent = 'Deleting…';
        const url = `/api/manga/${encodeURIComponent(id)}${folderExists ? '?delete_folder=true' : ''}`;
        const r = await fetch(url, { method: 'DELETE' });
        if (r.ok) {
          closePanel();
          allManga = allManga.filter(m => m.id !== id);
          render();
        } else {
          btn.disabled = false;
          btn.textContent = 'Yes, Delete';
        }
      });

      // Chapter list
      const chapters = data.chapters || [];
      if (!chapters.length) {
        document.getElementById('chapter-list').innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">No chapters downloaded yet.</div>';
        return;
      }
      document.getElementById('chapter-list').innerHTML = chapters.slice().reverse().map(f => {
        const readUrl = `/read/${encodeURIComponent(id)}/${encodeURIComponent(f)}`;
        const dlUrl = `/pdf/${encodeURIComponent(id)}/${encodeURIComponent(f)}?dl=1`;
        return `<div class="chapter-row">
          <span>${esc(f.replace(/\.pdf$/, ''))}</span>
          <a class="btn-read" href="${readUrl}" target="_blank">Read</a>
          <a class="btn-dl" href="${dlUrl}">↓</a>
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('chapter-list').innerHTML = '<div style="padding:20px;color:var(--red);font-size:13px">Failed to load chapters.</div>';
    }
  }

  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closePanel();
  });

  function closePanel() {
    document.getElementById('overlay').classList.remove('open');
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- cover picker ---

  document.getElementById('covers-close').addEventListener('click', () => {
    document.getElementById('covers-overlay').classList.remove('open');
  });

  async function openCovers(mangaId, mangaTitle) {
    const grid = document.getElementById('covers-grid');
    document.getElementById('covers-title').textContent = mangaTitle;
    grid.innerHTML = '<div class="covers-empty">Loading covers…</div>';
    document.getElementById('covers-overlay').classList.add('open');

    let covers;
    try {
      const r = await fetch(`/api/manga/${encodeURIComponent(mangaId)}/covers`);
      covers = await r.json();
    } catch(e) {
      grid.innerHTML = '<div class="covers-empty">Failed to load covers.</div>';
      return;
    }
    if (!covers.length) {
      grid.innerHTML = '<div class="covers-empty">No covers found on MangaDex.</div>';
      return;
    }

    grid.innerHTML = covers.map((c, i) => {
      const label = c.volume ? `Vol. ${esc(c.volume)}` : (c.locale ? esc(c.locale) : '—');
      return `<div class="cover-card" data-idx="${i}">
        <img src="${esc(c.thumb_url)}" loading="lazy" alt="${label}">
        <div class="cover-meta">${label}</div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.cover-card').forEach(card => {
      card.addEventListener('click', async () => {
        const c = covers[+card.dataset.idx];
        card.style.borderColor = 'var(--accent)';
        card.style.opacity = '.5';
        try {
          const r = await fetch(`/api/manga/${encodeURIComponent(mangaId)}/cover`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cover_url: c.cover_url, thumb_url: c.thumb_url})
          });
          if (r.ok) {
            const m = allManga.find(x => x.id === mangaId);
            if (m) { m.has_thumbnail = true; m.cover_url = c.cover_url; }
            document.getElementById('covers-overlay').classList.remove('open');
            render();
          } else {
            card.style.borderColor = 'var(--red)';
            card.style.opacity = '1';
          }
        } catch(e) {
          card.style.borderColor = 'var(--red)';
          card.style.opacity = '1';
        }
      });
    });
  }

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
